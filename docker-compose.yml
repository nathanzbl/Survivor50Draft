services:
  app:
    build: .
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5432/survivor50
      PORT: 3001
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

  # One-off seed runner: docker compose run --rm seed
  seed:
    build: .
    profiles: ["tools"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5432/survivor50
    command: ["node", "backend/dist/seed.js"]
