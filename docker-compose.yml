services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: survivor50
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/survivor50
      ADMIN_PASSWORD: survivor50admin
      JWT_SECRET: survivor50-draft-league-secret-key-2026
      PORT: 3001
      # ANTHROPIC_API_KEY: your-api-key-here

  # One-off seed runner: docker compose run --rm seed
  seed:
    build: .
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/survivor50
    command: ["node", "backend/dist/seed.js"]

volumes:
  pgdata:
